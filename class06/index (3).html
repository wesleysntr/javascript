<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(84, 84, 148);
            color: white;
            font: normal normal 1.25em Arial, sans-serif;
        }
        h1 {
            color: rgb(203, 203, 21);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Esta é a segunda linha de código.</p>
    <script>
        var n1 = Number(window.prompt('Digite um número'))
        var n2 = Number(window.prompt('Digite outro número'))

        window.alert(`A soma entre ${n1} e ${n2} é igual a ${String(s)}`)
    </script>
