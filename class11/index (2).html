<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <input id="txtvel" type="number" name="txtvel"> km/h
    <input id="btnver" type="button" value="Verificar" onclick="verificar()">
    <p id="resultado"></p>
    <script>
        var txtvel = window.document.getElementById('txtvel')
        var botão = window.document.getElementById('btnver')
        botão.addEventListener('click', verificar)
        var res = window.document.getElementById('resultado')
        function verificar() {
            var vel = Number(txtvel.value)
            res.innerHTML = `Sua velocidade: ${vel} km/h.<br>`
            if (vel > 60) {
                res.innerHTML += `Você foi <strong>multado</strong> por excesso de velocidade.`
            }
        res.innerHTML += `<p>Dirija sempre com cinto de segurança.</p>`
        }
    </script>
</body>
</html>
