<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>
            Contador Automático
        </h1>
    </header>
    <section>
        <div>
            Início: <input id="txtinicio" type="number" name="txtinicio">
        </div>
        <div>
            Fim: <input id="txtfim" type="number" name="txtfim">
        </div>
        <div>
            Passo: <input id="txtpasso" type="number" name="txtpasso">
        </div>
        <br>
        <input id="btn" type="button" value="Contar" name="btn">
        <p id="res">
            Preparando contagem...
        </p>
    </section>
    <footer>
        Desenvolvido por <strong>Wesley Santos Rocha</strong>
    </footer>
    <script src="script.js"></script>
</body>
</html>
